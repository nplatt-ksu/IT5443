<!DOCTYPE html>
<html>
<head>
  <title>Selection</title>
</head>
<body>

  <script>
    let number = Number(prompt("Enter a number:"));

    if (number > 0) {
      document.write("The number is positive<br>");
    } else {
      document.write("The number is negative<br>");
    }

    let str1 = "hello";
    let str2 = "hello";

    if (str1 === str2) {
      document.write("The strings are the same");
    } else {
      document.write("The strings are different");
    }
  </script>

</body>
</html>
