<!DOCTYPE html>
<html>
<head>
  <title>Loop</title>
</head>
<body>

  <script>
    let num = Number(prompt("Enter a number for the list:"));

    document.write("<ul>");
    for (let i = 1; i <= num; i++) {
      document.write("<li>" + i + "</li>");
    }
    document.write("</ul>");

    let count = Number(prompt("Enter a number to sum up to:"));
    let sum = 0;
    let i = 1;

    while (i <= count) {
      sum += i;
      i++;
    }
    document.write("Sum: " + sum + "<br>");

    let x = Number(prompt("Enter number of rows:"));
    let y = Number(prompt("Enter number of columns:"));

    document.write("<table border='1'>");
    for (let r = 0; r < x; r++) {
      document.write("<tr>");
      for (let c = 0; c < y; c++) {
        document.write("<td>Cell</td>");
      }
      document.write("</tr>");
    }
    document.write("</table>");
  </script>

</body>
</html>
