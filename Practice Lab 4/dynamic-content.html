<!DOCTYPE html>
<html>
<head>
  <title>Dynamic Content</title>
</head>
<body>

  <script>
    let name = prompt("Enter your name:");
    let heading = "h2";
    let color = "blue";

    document.write("<" + heading + " style='color:" + color + "'>");
    document.write("Welcome, " + name);
    document.write("</" + heading + ">");
  </script>

</body>
</html>
